version: "3.9"

# ─── IndiCarbon AI — Orchestration ────────────────────────────────────────────
# All services communicate via the internal "indicarbon_net" network.
# External traffic enters ONLY through the API Gateway on port 8000.
# Ollama runs on the HOST machine — containers reach it via host.docker.internal:11434

networks:
  indicarbon_net:
    driver: bridge

volumes:
  redis_data:

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: indicarbon_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - apps/backend/.envs/.redis.env
    volumes:
      - redis_data:/data
    networks:
      - indicarbon_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Auth Service ─────────────────────────────────────────────────────────────

  auth:
    build:
      context: ./apps/backend
      dockerfile: services/auth/Dockerfile
      target: production
    container_name: indicarbon_auth
    restart: unless-stopped
    env_file:
      - apps/backend/.envs/.auth.env
      - apps/backend/.envs/.supabase.env
    networks:
      - indicarbon_net
    expose:
      - "8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Compliance Service ───────────────────────────────────────────────────────

  compliance:
    build:
      context: ./apps/backend
      dockerfile: services/compliance/Dockerfile
      target: production
    container_name: indicarbon_compliance
    restart: unless-stopped
    env_file:
      - apps/backend/.envs/.compliance.env
      - apps/backend/.envs/.supabase.env
    networks:
      - indicarbon_net
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Marketplace Service ──────────────────────────────────────────────────────

  marketplace:
    build:
      context: ./apps/backend
      dockerfile: services/marketplace/Dockerfile
      target: production
    container_name: indicarbon_marketplace
    restart: unless-stopped
    env_file:
      - apps/backend/.envs/.marketplace.env
      - apps/backend/.envs/.supabase.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - indicarbon_net
    expose:
      - "8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── AI Agent Service ─────────────────────────────────────────────────────────

  ai-agent:
    build:
      context: ./apps/backend
      dockerfile: services/ai-agent/Dockerfile
      target: production
    container_name: indicarbon_ai_agent
    restart: unless-stopped
    env_file:
      - apps/backend/.envs/.ai-agent.env
      - apps/backend/.envs/.supabase.env
      - apps/backend/.envs/.langfuse.env
    depends_on:
      compliance:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - indicarbon_net
    expose:
      - "8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── API Gateway ──────────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./apps/backend
      dockerfile: services/gateway/Dockerfile
      target: production
    container_name: indicarbon_gateway
    restart: unless-stopped
    env_file:
      - apps/backend/.envs/.gateway.env
      - apps/backend/.envs/.supabase.env
    depends_on:
      auth:
        condition: service_healthy
      compliance:
        condition: service_healthy
      marketplace:
        condition: service_healthy
      ai-agent:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - indicarbon_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: production
    container_name: indicarbon_frontend
    restart: unless-stopped
    env_file:
      - apps/backend/.envs/.frontend.env
    depends_on:
      - gateway
    ports:
      - "3000:3000"
    networks:
      - indicarbon_net
